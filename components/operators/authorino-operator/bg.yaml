apiVersion: v1
kind: Pod
metadata:
  name: print-argocd-controller-token
  namespace: openshift-gitops
spec:
  serviceAccountName: openshift-gitops-argocd-application-controller
  restartPolicy: Never
  containers:
  - name: token
    image: registry.redhat.io/openshift4/ose-cli:latest
    command: ["/bin/bash","-lc"]
    args:
    - |
      set -euo pipefail
      echo "Requesting token for SA openshift-gitops-argocd-application-controller..."
      TOKEN="$(oc -n openshift-gitops create token openshift-gitops-argocd-application-controller --duration=24h)"
      echo ""
      echo "===== TOKEN BEGIN ====="
      echo "${TOKEN}"
      echo "===== TOKEN END ====="
      echo ""
      sleep 3600
